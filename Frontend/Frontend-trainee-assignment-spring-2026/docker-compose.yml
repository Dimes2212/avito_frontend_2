services:
  server:
    build: ./server
    container_name: avito_server
    environment:
      PORT: 8080
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:3b
    ports:
      - '8080:8080'
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    container_name: avito_frontend
    ports:
      - '5173:5173'
    depends_on:
      - server

  ollama:
    image: ollama/ollama:latest
    container_name: avito_ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  ollama_init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: /bin/sh
    command: -c "sleep 5 && OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5:3b"
    restart: 'no'

volumes:
  ollama_data:
